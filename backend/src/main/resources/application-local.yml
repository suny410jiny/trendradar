spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/trendradar
    username: trendradar
    password: trendradar1234
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

youtube:
  api:
    key: ${YOUTUBE_API_KEY:test-key}
    base-url: https://www.googleapis.com

claude:
  api:
    key: ${CLAUDE_API_KEY:}
    base-url: https://api.anthropic.com

logging:
  level:
    com.trendradar: DEBUG
    org.hibernate.SQL: DEBUG

admin:
  api:
    key: ${ADMIN_API_KEY:dev-admin-key-12345}
