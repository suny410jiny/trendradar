spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration

youtube:
  api:
    key: ${YOUTUBE_API_KEY}
    base-url: https://www.googleapis.com

claude:
  api:
    key: ${CLAUDE_API_KEY:}
    base-url: https://api.anthropic.com

admin:
  api:
    key: ${ADMIN_API_KEY}

logging:
  level:
    com.trendradar: INFO
