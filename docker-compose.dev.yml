version: '3.8'
services:
  postgres:
    image: postgres:16-alpine
    container_name: trendradar-postgres-dev
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: trendradar
      POSTGRES_USER: trendradar
      POSTGRES_PASSWORD: trendradar1234
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data

volumes:
  postgres_dev_data:
