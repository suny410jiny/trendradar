version: '3.8'
services:
  nginx:
    image: nginx:alpine
    container_name: trendradar-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/ssl:/etc/nginx/ssl
    depends_on:
      - backend
    networks:
      - trendradar-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: trendradar-backend
    ports:
      - "8081:8081"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - YOUTUBE_API_KEY=${YOUTUBE_API_KEY}
      - CLAUDE_API_KEY=${CLAUDE_API_KEY}
      - DB_URL=jdbc:postgresql://postgres:5432/trendradar
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8081/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - trendradar-network

  postgres:
    image: postgres:16-alpine
    container_name: trendradar-postgres
    environment:
      POSTGRES_DB: trendradar
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d trendradar"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - trendradar-network

networks:
  trendradar-network:
    driver: bridge

volumes:
  postgres_data:
